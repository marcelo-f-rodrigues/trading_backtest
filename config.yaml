# ============================================================
# Configuração Central do Framework
# ============================================================

# --- Ativos disponíveis ---
assets:
  - BTCUSD
  - BOVA11
  - IVVB11
  - USDBRL
  - XAUUSD
  - WTIUSD
  - DOLFUT
  - COPPERFUT
  - SOYFUT

# --- Formato esperado dos CSVs ---
# Suporta tanto o formato padrão (Date,Open,High,Low,Close,Volume)
# quanto o formato do Investing.com em português
# (Data,Último,Abertura,Máxima,Mínima,Vol.,Var%), com números no
# formato "1.234,56" e datas "dd.mm.yyyy".
data:
  directory: "data/raw"

  # Mapeia o nome do ativo (usado no código) -> texto a ser procurado
  # (case-insensitive, substring) no nome do arquivo dentro de data/raw.
  asset_aliases:
    BTCUSD:    "Bitcoin"
    BOVA11:    "BOVA11"
    IVVB11:    "IVVB11"
    USDBRL:    "USD_BRL"
    XAUUSD:    "XAU_USD"
    WTIUSD:    "WTI_USD"
    DOLFUT:    "Índice Dólar Futuros"
    COPPERFUT: "Cobre Futuros"
    SOYFUT:    "Soja Chicago Futuros"

# --- Engine de Backtest ---
backtest:
  initial_capital: 100000.0  # Capital inicial em USD/BRL
  commission: 0.001           # Comissão por operação (0.1%)
  slippage: 0.001             # Slippage estimado (0.1%)

  # Entradas/saídas graduais
  gradual_entry:
    enabled: true
    n_tranches: 3             # Número de parcelas para montar/desmontar posição
    tranche_interval_days: 3  # Dias entre cada parcela

# --- Janelas temporais para robustez ---
temporal_windows:
  - name: "2010-2015"
    start: "2010-01-01"
    end:   "2015-12-31"
  - name: "2015-2020"
    start: "2015-01-01"
    end:   "2020-12-31"
  - name: "2020-2026"
    start: "2020-01-01"
    end:   "2026-12-31"
  - name: "full"
    start: null
    end:   null

# --- Thresholds para classificação ---
thresholds:
  sharpe_positive: 0.0
  calmar_good: 0.5
  ruin_risk_low: 0.05         # < 5% → baixo risco de ruína
  ruin_risk_high: 0.20        # > 20% → alto risco de ruína
  flow_frequent: 24           # > 24 trades/ano → fluxo recorrente
  flow_sporadic: 6            # < 6 trades/ano → fluxo esporádico

# --- Métricas para rankings por perfil ---
profiles:
  growth:
    metrics: [cagr, total_return, capital_efficiency]
    weights: [0.5, 0.3, 0.2]
  preservation:
    metrics: [max_drawdown, ruin_risk, recovery_time]
    weights: [0.4, 0.4, 0.2]
  flow:
    metrics: [pct_months_positive, trades_per_year, monthly_return_std]
    weights: [0.4, 0.3, 0.3]
  simplicity:
    metrics: [complexity_score, decisions_per_year, n_parameters]
    weights: [0.5, 0.3, 0.2]
  robustness:
    metrics: [cross_asset_score, temporal_score, parametric_score]
    weights: [0.4, 0.3, 0.3]
